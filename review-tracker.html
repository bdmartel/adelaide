<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Adelaide — Kristen Review Action Items (2026-03-26)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111114;
    --surface: #1a1a1f;
    --surface-hover: #222228;
    --border: #2a2a32;
    --text: #e0e0e6;
    --text-dim: #888894;
    --text-muted: #555560;
    --amber: #d4a843;
    --amber-dim: #a07e2f;
    --amber-bg: rgba(212, 168, 67, 0.08);
    --amber-border: rgba(212, 168, 67, 0.2);
    --blue: #5b8ad4;
    --blue-dim: #3d6ab3;
    --blue-bg: rgba(91, 138, 212, 0.08);
    --blue-border: rgba(91, 138, 212, 0.2);
    --green: #5bbd72;
    --green-dim: #3d9950;
    --green-bg: rgba(91, 189, 114, 0.08);
    --green-border: rgba(91, 189, 114, 0.2);
    --check: #4ade80;
    --in-progress: #f59e0b;
    --in-progress-bg: rgba(245, 158, 11, 0.06);
    --in-progress-border: rgba(245, 158, 11, 0.35);
    --radius: 8px;
  }

  html { font-size: 15px; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }

  header { margin-bottom: 24px; }

  h1 {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.3;
  }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 20px;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-dim);
  }

  .progress-stats {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .progress-stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stat-done { color: var(--check); }
  .stat-progress { color: var(--in-progress); }
  .stat-total { color: var(--text-muted); }

  .stat-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
  }

  .stat-dot.done { background: var(--check); }
  .stat-dot.progress { background: var(--in-progress); }

  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    display: flex;
  }

  .progress-fill-done {
    height: 100%;
    background: var(--check);
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-fill-wip {
    height: 100%;
    background: var(--in-progress);
    transition: width 0.3s ease;
    width: 0%;
  }

  /* Action buttons row */
  .actions {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:hover { background: var(--surface-hover); color: var(--text); }
  .btn:active { transform: scale(0.97); }

  .btn.copied {
    border-color: var(--check);
    color: var(--check);
  }

  .btn-share {
    background: #1a2a3a;
    border-color: #3a5a7a;
  }

  /* Category sections */
  .category { margin-bottom: 16px; }

  .category-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    margin-bottom: 4px;
    cursor: default;
  }

  .category-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .category-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .category-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    margin-left: auto;
  }

  .cat-print .category-dot { background: var(--amber); }
  .cat-print .category-title { color: var(--amber); }

  .cat-web .category-dot { background: var(--blue); }
  .cat-web .category-title { color: var(--blue); }

  .cat-delivery .category-dot { background: var(--green); }
  .cat-delivery .category-title { color: var(--green); }

  /* Items */
  .item {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    overflow: hidden;
    transition: border-color 0.15s ease, opacity 0.15s ease, border-left 0.15s ease;
    border-left: 3px solid transparent;
  }

  .cat-print .item { border-color: var(--amber-border); border-left-color: transparent; }
  .cat-web .item { border-color: var(--blue-border); border-left-color: transparent; }
  .cat-delivery .item { border-color: var(--green-border); border-left-color: transparent; }

  /* In-progress: amber left border */
  .item.in-progress { border-left-color: var(--in-progress); background: var(--in-progress-bg); }

  /* Done: muted + strikethrough */
  .item.done { opacity: 0.45; }
  .item.done .item-summary { text-decoration: line-through; text-decoration-color: var(--text-muted); }

  .item-row {
    display: flex;
    align-items: flex-start;
    padding: 10px 12px;
    gap: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  .cat-print .item-row:hover { background: var(--amber-bg); }
  .cat-web .item-row:hover { background: var(--blue-bg); }
  .cat-delivery .item-row:hover { background: var(--green-bg); }

  /* Status indicator (replaces checkbox) */
  .status-indicator {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-top: 0px;
    -webkit-tap-highlight-color: transparent;
  }

  /* Todo: empty circle */
  .status-indicator.todo {
    border: 2px solid var(--text-muted);
    background: transparent;
  }
  .status-indicator.todo:hover {
    border-color: var(--text-dim);
  }

  /* In progress: filled amber with pulse */
  .status-indicator.wip {
    border: 2px solid var(--in-progress);
    background: var(--in-progress);
  }

  @keyframes pulse-wip {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
    50% { box-shadow: 0 0 0 5px rgba(245, 158, 11, 0); }
  }

  .status-indicator.wip {
    animation: pulse-wip 2s ease-in-out infinite;
  }

  /* Done: green checkmark */
  .status-indicator.complete {
    border: 2px solid var(--check);
    background: var(--check);
  }

  .status-indicator svg {
    width: 12px;
    height: 12px;
  }

  .item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-muted);
    flex-shrink: 0;
    width: 22px;
    text-align: right;
    margin-top: 2px;
  }

  .cat-print .item-num { color: var(--amber-dim); }
  .cat-web .item-num { color: var(--blue-dim); }
  .cat-delivery .item-num { color: var(--green-dim); }

  .item-content {
    flex: 1;
    min-width: 0;
  }

  .item-summary {
    font-size: 0.87rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }

  .item-status-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .item-status-label.wip { color: var(--in-progress); }
  .item-status-label.complete { color: var(--check); }

  .item-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
  .item:hover .item-actions, .item:focus-within .item-actions { opacity: 1; }
  @media (max-width: 600px) { .item-actions { opacity: 1; } }
  .action-btn { background: none; border: 1px solid var(--border); border-radius: 4px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-dim); transition: all 0.15s; }
  .action-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .edit-btn:hover { color: #6ba3d6; border-color: #6ba3d6; }
  .delete-btn:hover { color: #d66b6b; border-color: #d66b6b; }

  .expand-btn {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: transform 0.2s ease;
    margin-top: 0px;
  }

  .item.expanded .expand-btn { transform: rotate(90deg); }

  .item-detail {
    display: none;
    padding: 0 12px 12px 54px;
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .item.expanded .item-detail { display: block; }
  .item-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .item-link { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; font-weight: 500; color: var(--blue); background: var(--blue-bg); border: 1px solid var(--blue-border); border-radius: 4px; text-decoration: none; transition: all 0.15s; }
  .item-link:hover { background: rgba(91, 138, 212, 0.18); color: #8ab4e8; }
  .cat-print .item-link { color: var(--amber); background: var(--amber-bg); border-color: var(--amber-border); }
  .cat-print .item-link:hover { background: rgba(212, 168, 67, 0.18); color: #e8c85b; }
  .cat-delivery .item-link { color: var(--green); background: var(--green-bg); border-color: var(--green-border); }
  .cat-delivery .item-link:hover { background: rgba(91, 189, 114, 0.18); color: #7de89b; }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
    z-index: 100;
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
  }

  .toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* Responsive */
  @media (max-width: 500px) {
    .container { padding: 16px 12px 80px; }
    h1 { font-size: 1.05rem; }
    .item-row { padding: 9px 10px; gap: 8px; }
    .item-detail { padding-left: 44px; }
    .item-num { width: 20px; font-size: 0.68rem; }
    .progress-stats { gap: 8px; }
    .progress-stat { font-size: 0.68rem; }
  }
  /* ===== PRINT: Zebra Stripe ===== */
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
    body { background: #fff !important; color: #111 !important; padding: 0; font-size: 11px; }
    .header { position: static; background: #fff !important; border-bottom: 2px solid #111; padding: 12px 0; }
    .header h1 { color: #111 !important; font-size: 14px; }
    .progress-bar, .btn-group, .action-btn, .expand-btn, .item-actions { display: none !important; }
    .category { background: none !important; border: none !important; margin-bottom: 8px; break-inside: avoid; }
    .category-header { padding: 6px 8px; background: #111 !important; color: #fff !important; border-radius: 0; }
    .category-title { color: #fff !important; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .category-dot { display: none; }
    .category-count { color: #ccc !important; font-size: 9px; }
    .item { border: none !important; border-radius: 0 !important; padding: 4px 8px; margin: 0; background: #fff !important; }
    .item:nth-child(odd) { background: #fff !important; }
    .item:nth-child(even) { background: #f0f0f0 !important; }
    .item-row { gap: 6px; }
    .status-indicator { width: 14px !important; height: 14px !important; border: 1.5px solid #333 !important; flex-shrink: 0; }
    .status-indicator.done { background: #111 !important; border-color: #111 !important; }
    .status-indicator.done svg path { stroke: #fff !important; }
    .status-indicator.wip { background: #888 !important; border-color: #888 !important; animation: none !important; }
    .item.checked { opacity: 1 !important; }
    .item.checked .item-summary { text-decoration: line-through; color: #888 !important; }
    .item.wip { border-left: none !important; }
    .item.wip .item-summary { color: #111 !important; }
    .item-num { color: #666 !important; font-size: 8px; }
    .item-summary { color: #111 !important; font-size: 10px; }
    .item-timestamp { font-size: 8px; color: #888 !important; }
    .item-detail { display: none !important; }
    .cat-print .item-num, .cat-web .item-num, .cat-delivery .item-num { color: #666 !important; }
    .cat-print .category-header { background: #3d3520 !important; }
    .cat-web .category-header { background: #1e2d4a !important; }
    .cat-delivery .category-header { background: #1e3d28 !important; }
    .container { max-width: 100%; padding: 0; }
    @page { margin: 0.5in; size: letter; }
  }
</style>
</head>

<div class="container">
  <header>
    <h1>Adelaide — Kristen Review Action Items (2026-03-26)</h1>
    <div class="subtitle">2026-03-26 &middot; 36 items</div>

  <div class="progress-wrap">

        <span class="progress-stat stat-progress"><span class="stat-dot progress"></span> <span id="wipCount">0</span> wip</span>
        <span class="progress-stat stat-total">/ <span id="totalCount">28</span></span>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill-done" id="progressDone"></div>
      <div class="progress-fill-wip" id="progressWip"></div>
    </div>
  </div>

  <div class="actions">
    <button class="btn" id="copyBtn" onclick="copyUnchecked()">Copy unchecked</button>
    <button class="btn btn-share" id="shareBtn" onclick="shareLink()">Share link</button>
    <button class="btn" onclick="addItem()" style="background:#2a4a2a;border-color:#4a7a4a;">+ Add item</button>
    <button class="btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand all</button>
    <button class="btn" id="resetBtn" onclick="resetAll()">Reset all</button>
  </div>

  <div id="itemsContainer"></div>
</div>

<div class="toast" id="toast"></div>

// State: 0 = todo, 1 = in-progress, 2 = done
let states = new Array(ITEMS.length).fill(0);
let allExpanded = false;

// --- URL hash state ---

function statesFromHash() {
  const hash = location.hash;
  if (!hash || !hash.startsWith('#s=')) return null;
  const vals = hash.slice(3).split(',').map(Number);
  if (vals.length !== ITEMS.length) return null;
  if (vals.some(v => v !== 0 && v !== 1 && v !== 2)) return null;
  return vals;
}

function statesToHash() {
  location.hash = '#s=' + states.join(',');
}

function loadState() {
  const fromHash = statesFromHash();
  if (fromHash) {
    states = fromHash;
  }
}

// --- UI rendering ---

function getStatusHTML(state) {
  if (state === 0) {
    // Todo: empty circle
    return '<div class="status-indicator todo"></div>';
  } else if (state === 1) {
    // In progress: filled amber circle
    return '<div class="status-indicator wip"></div>';
  } else {
    // Done: green checkmark circle
    return '<div class="status-indicator complete"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5L4.5 9L10 3" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';
  }
}

function getStatusLabel(state) {
  if (state === 1) return '<div class="item-status-label wip">in progress</div>';
  if (state === 2) return '<div class="item-status-label complete">done</div>';
  return '';
}

function getItemClass(state) {
  if (state === 1) return ' in-progress';
  if (state === 2) return ' done';
  return '';
}

function updateProgress() {
  let done = 0, wip = 0;
  states.forEach(s => {
    if (s === 2) done++;
    else if (s === 1) wip++;
  });
  const total = ITEMS.length;

  document.getElementById('doneCount').textContent = done;
  document.getElementById('wipCount').textContent = wip;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('progressDone').style.width = ((done / total) * 100) + '%';
  document.getElementById('progressWip').style.width = ((wip / total) * 100) + '%';

  // Update category counts
  document.querySelectorAll('.category').forEach(cat => {
    const indices = JSON.parse(cat.dataset.indices || '[]');
    let catDone = 0, catWip = 0;
    indices.forEach(i => {
      if (states[i] === 2) catDone++;
      else if (states[i] === 1) catWip++;
    });
    const catTotal = indices.length;
    const countEl = cat.querySelector('.category-count');
    if (countEl) {
      const parts = [];
      if (catDone > 0) parts.push(catDone + '\u2713');
      if (catWip > 0) parts.push(catWip + '\u25cf');
      countEl.textContent = parts.length > 0 ? parts.join(' ') + ' / ' + catTotal : '0/' + catTotal;
    }
  });
}

function cycleState(index) {
  // 0 -> 1 -> 2 -> 0
  states[index] = (states[index] + 1) % 3;
  statesToHash();

  const itemEl = document.querySelector('[data-item-index="' + index + '"]');
  if (itemEl) {
    itemEl.className = 'item' + getItemClass(states[index]);
    if (itemEl.classList.contains('_expanded')) {
      // preserve expanded
    }
    // Check if it was expanded
    const wasExpanded = itemEl.querySelector('.item-detail') && itemEl.querySelector('.item-detail').style.display === 'block';

    // Update the status indicator
    const statusWrap = itemEl.querySelector('.status-wrap');
    statusWrap.innerHTML = getStatusHTML(states[index]);

    // Update status label
    const labelEl = itemEl.querySelector('.item-status-label');
    const newLabel = getStatusLabel(states[index]);
    if (labelEl) {
      if (newLabel) {
        labelEl.outerHTML = newLabel;
      } else {
        labelEl.remove();
      }
    } else if (newLabel) {
      const content = itemEl.querySelector('.item-content');
      content.insertAdjacentHTML('beforeend', newLabel);
    }

    // Update class
    itemEl.classList.remove('in-progress', 'done');
    if (states[index] === 1) itemEl.classList.add('in-progress');
    else if (states[index] === 2) itemEl.classList.add('done');

    // Restore expanded state
    if (wasExpanded) {
      itemEl.classList.add('expanded');
    }
  }

  updateProgress();
}

function toggleDetail(itemEl) {
  itemEl.classList.toggle('expanded');
}

function buildUI() {
  const container = document.getElementById('itemsContainer');
  container.innerHTML = '';
  let currentCategory = '';
  let categoryDiv = null;
  let categoryIndices = [];

  ITEMS.forEach((item, index) => {
    if (item.category !== currentCategory) {
      // Finalize previous category
      if (categoryDiv) {
        categoryDiv.dataset.indices = JSON.stringify(categoryIndices);
      }

      currentCategory = item.category;
      categoryIndices = [];
      categoryDiv = document.createElement('div');
      categoryDiv.className = 'category cat-' + item.catType;

      const catCount = ITEMS.filter(i => i.category === currentCategory).length;

      categoryDiv.innerHTML =
        '<div class="category-header">' +
          '<span class="category-dot"></span>' +
          '<span class="category-title">' + currentCategory + '</span>' +
          '<span class="category-count">0/' + catCount + '</span>' +
        '</div>';
      container.appendChild(categoryDiv);
    }

    categoryIndices.push(index);

    const state = states[index];
    const el = document.createElement('div');
    el.className = 'item' + getItemClass(state);
    el.setAttribute('data-item-index', index);

    el.innerHTML =
      '<div class="item-row">' +
        '<div class="status-wrap" onclick="event.stopPropagation(); cycleState(' + index + ')">' +
          getStatusHTML(state) +
        '</div>' +
        '<span class="item-num">' + item.id + '</span>' +
        '<div class="item-content" onclick="toggleDetail(this.closest(\'.item\'))">' +
          '<div class="item-summary">' + item.summary + '</div>' +
          getStatusLabel(state) +
        '</div>' +
        '<div class="item-actions" onclick="event.stopPropagation()">' +
          '<button class="action-btn edit-btn" onclick="editItem(' + index + ')" title="Edit">' +
            '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M10 1.5l2.5 2.5L4.5 12H2v-2.5L10 1.5z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '</button>' +
          '<button class="action-btn delete-btn" onclick="removeItem(' + index + ')" title="Remove">' +
            '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5h4V4M3.5 4v8h7V4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '</button>' +
        '</div>' +
        '<div class="expand-btn" onclick="toggleDetail(this.closest(\'.item\'))">' +
          '<svg width="16" height="16" viewBox="0 0 16 16" fill="none">' +
            '<path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
          '</svg>' +
        '</div>' +
      '</div>' +
      '<div class="item-detail">' + item.detail +
        (item.links && item.links.length ? '<div class="item-links">' + item.links.map(function(l) { return '<a class="item-link" href="' + l.url + '" target="_blank" onclick="event.stopPropagation()">' + l.label + ' \u2197</a>'; }).join('') + '</div>' : '') +
      '</div>';

    categoryDiv.appendChild(el);
  });

  // Finalize last category
  if (categoryDiv) {
    categoryDiv.dataset.indices = JSON.stringify(categoryIndices);
  }
}

function editItem(index) {
  const item = ITEMS[index];
  if (!item) return;
  const newSummary = prompt('Edit summary:', item.summary);
  if (newSummary === null) return;
  item.summary = newSummary;
  const newDetail = prompt('Edit detail:', item.detail);
  if (newDetail !== null) item.detail = newDetail;
  rebuildUI();
}

function removeItem(index) {
  const item = ITEMS[index];
  if (!item) return;
  if (!confirm('Remove "' + item.summary + '"?')) return;
  ITEMS.splice(index, 1);
  states.splice(index, 1);
  statesToHash();
  rebuildUI();
}

function addItem() {
  const categories = [];
  const seen = {};
  ITEMS.forEach(function(i) {
    if (!seen[i.category]) {
      seen[i.category] = true;
      categories.push(i.category);
    }
  });
  const catChoice = prompt('Category (or type new):\n' + categories.map(function(c, i) { return (i+1) + '. ' + c; }).join('\n'));
  if (!catChoice) return;
  var category, catType;
  var num = parseInt(catChoice);
  if (num > 0 && num <= categories.length) {
    category = categories[num - 1];
    catType = ITEMS.find(function(i) { return i.category === category; }).catType;
  } else {
    category = catChoice;
    catType = prompt('Type (print/web/delivery):', 'web') || 'web';
  }
  var summary = prompt('Summary:');
  if (!summary) return;
  var detail = prompt('Detail (optional):', '') || '';
  var maxId = Math.max.apply(null, ITEMS.map(function(i) { return i.id; }));
  ITEMS.push({ id: maxId + 1, category: category, catType: catType, summary: summary, detail: detail });
  states.push(0);
  statesToHash();
  rebuildUI();
}

function copyUnchecked() {
  var lines = [];
  ITEMS.forEach(function(item, index) {
    if (states[index] !== 2) {
      var prefix = states[index] === 1 ? '[WIP] ' : '';
      lines.push(item.id + '. ' + prefix + '[' + item.category + '] ' + item.summary);
    }
  });

  if (lines.length === 0) {
    var btn = document.getElementById('copyBtn');
    btn.textContent = 'All done!';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'Copy unchecked'; btn.classList.remove('copied'); }, 2000);
    return;
  }

  var text = 'Adelaide Review Items \u2014 Remaining (' + lines.length + ')\n\n' + lines.join('\n');
  copyToClipboard(text, function() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied ' + lines.length + ' items';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'Copy unchecked'; btn.classList.remove('copied'); }, 2000);
  });
}

function shareLink() {
  var url = location.href;
  copyToClipboard(url, function() {
    showToast('Link copied to clipboard');
    var btn = document.getElementById('shareBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'Share link'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyToClipboard(text, onSuccess) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(function() {
      fallbackCopy(text, onSuccess);
    });
  } else {
    fallbackCopy(text, onSuccess);
  }
}

function fallbackCopy(text, onSuccess) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    if (onSuccess) onSuccess();
  } catch (e) {
    // silent fail
  }
  document.body.removeChild(ta);
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(function() { el.classList.remove('visible'); }, 2200);
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  document.querySelectorAll('.item').forEach(function(el) {
    if (allExpanded) {
      el.classList.add('expanded');
    } else {
      el.classList.remove('expanded');
    }
  });
  document.getElementById('expandAllBtn').textContent = allExpanded ? 'Collapse all' : 'Expand all';
}

function resetAll() {
  if (!confirm('Reset all items to unchecked? This cannot be undone.')) return;
  states = new Array(ITEMS.length).fill(0);
  statesToHash();
  rebuildUI();
}

function rebuildUI() {
  buildUI();
  updateProgress();
}

// Listen for hash changes (e.g., back/forward navigation)
window.addEventListener('hashchange', function() {
  var fromHash = statesFromHash();
  if (fromHash) {
    states = fromHash;
    rebuildUI();
  }
});

// Init
loadState();
buildUI();
updateProgress();
